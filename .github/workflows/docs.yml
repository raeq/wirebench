name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required permissions for the Pages deployment via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; queue rather than cancel
# in-progress runs so a documentation push doesn't truncate the
# previous one mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install mkdocs mkdocs-material
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
