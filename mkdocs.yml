site_name: wirebench
site_url: https://raeq.github.io/wirebench/
repo_url: https://github.com/raeq/wirebench
repo_name: raeq/wirebench

theme:
  name: material
  palette:
    primary: green
  features:
    - navigation.instant
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Design principles: design-principles.md
  - The rules: the-rules.md
  - Learning path: learning-path.md
  - 'Components — auto index': parts.md
  - 'Component notes — curated': component-library-data.md
  - Prevention benchmark: prevention-benchmark.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
